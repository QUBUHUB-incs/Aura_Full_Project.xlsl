<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aura Quantum Lab – Hybrid AI Edition</title>
<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at center, #000015, #01010a 80%);
  color: #d0f0ff;
  overflow-x: hidden;
}
h1, h2 {
  text-align: center;
  color: #66ccff;
  text-shadow: 0 0 10px #00f6ff;
}
section {
  padding: 20px;
  margin: 30px auto;
  width: 80%;
  border: 1px solid #00aaff;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(0,255,255,0.3);
  background: rgba(0, 20, 30, 0.6);
}
input, textarea, button {
  font-family: 'Courier New', monospace;
  background: rgba(0,30,40,0.7);
  color: #00f6ff;
  border: 1px solid #00aaff;
  border-radius: 6px;
  padding: 8px;
  margin: 5px;
}
button:hover {
  background: #00aaff;
  color: black;
  cursor: pointer;
}
canvas {
  display: block;
  margin: 20px auto;
  border: 1px solid #00f6ff;
  border-radius: 6px;
  background: radial-gradient(circle, #001022, #000);
}
#voiceIndicator {
  text-align: center;
  color: #00ffcc;
  margin-top: 10px;
  font-size: 14px;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<h1>🌌 Aura Quantum Lab – AI Teacher</h1>

<section>
  <h2>Mathematics & Physics</h2>
  <input id="mathInput" type="text" placeholder="Enter formula (e.g. 0.5*m*v**2)">
  <button onclick="computeFormula()">Compute</button>
  <p id="mathResult"></p>
  <p id="mathHint"></p>
</section>

<section>
  <h2>Chemistry Simulator</h2>
  <textarea id="chemInput">{ "H2":2 }, { "O2":1 }</textarea>
  <button onclick="simulateReaction()">Simulate Reaction</button>
  <p id="chemResult"></p>
  <p id="chemHint"></p>
</section>

<section>
  <h2>Quantum Playground</h2>
  <canvas id="quantumCanvas" width="400" height="400"></canvas>
  <button onclick="runQuantumDemo()">Run Quantum Demo</button>
  <p id="quantumResult"></p>
  <p id="quantumHint"></p>
</section>

<div id="voiceIndicator">🔊 Aura is ready to speak</div>

<script>
const AITeacher = {
  explainFormula(formula) {
    if (formula.includes("c**2")) return "You're invoking Einstein's mass-energy equivalence.";
    if (formula.includes("0.5")) return "That's kinetic energy, based on Newtonian mechanics.";
    if (formula.includes("sin") || formula.includes("cos")) return "You’re exploring wave-like behavior. Trigonometry ties directly to quantum waveforms.";
    return "This formula explores relationships between quantities. Let’s compute it together.";
  },
  suggestChemistry(react, prod) {
    return "Reactants transform into products through bond rearrangements. Energy differences define reaction feasibility.";
  },
  guideQuantum(q) {
    return "This represents a qubit in superposition. Observe the amplitude and phase on the visualization.";
  },
  suggestNextStep(type) {
    if (type === "quantum") return "Try adding an entangling gate next or measure the qubit.";
    return "Experiment with another variable or constant to observe behavior.";
  },
  speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 1.1;
    msg.pitch = 1.1;
    msg.voice = speechSynthesis.getVoices().find(v => v.name.includes("Google")) || null;
    speechSynthesis.speak(msg);
    document.getElementById("voiceIndicator").innerText = "🗣️ Aura speaking...";
    msg.onend = () => document.getElementById("voiceIndicator").innerText = "🔊 Aura ready";
  }
};

// Computation
function computeFormula() {
  const formula = document.getElementById("mathInput").value;
  let result;
  try { result = eval(formula); } catch(e) { result = "Error: "+e; }
  const hint = AITeacher.explainFormula(formula);
  document.getElementById("mathResult").innerText = "Result: " + result;
  document.getElementById("mathHint").innerText = hint;
  AITeacher.speak("The result is " + result + ". " + hint);
}

// Chemistry
function simulateReaction() {
  try {
    const [react, prod] = JSON.parse("[" + document.getElementById("chemInput").value + "]");
    const energy = Math.random()*100 - 50;
    const hint = AITeacher.suggestChemistry(react, prod);
    document.getElementById("chemResult").innerText = "Energy: " + energy.toFixed(2) + " kJ";
    document.getElementById("chemHint").innerText = hint;
    AITeacher.speak("Estimated reaction energy is " + energy.toFixed(1) + " kilojoules. " + hint);
  } catch(e) {
    document.getElementById("chemResult").innerText = "Error: "+e;
  }
}

// Quantum Simulation
let scene, camera, renderer, earth, glow;
function initGlobe() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({canvas: document.getElementById("quantumCanvas"), antialias: true});
  renderer.setSize(400, 400);
  const texture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg');
  const geometry = new THREE.SphereGeometry(1, 64, 64);
  const material = new THREE.MeshPhongMaterial({ map: texture });
  earth = new THREE.Mesh(geometry, material);
  scene.add(earth);
  const light = new THREE.PointLight(0x00ffff, 1.5);
  light.position.set(2, 2, 3);
  scene.add(light);
  camera.position.z = 3;
  animateGlobe();
}
function animateGlobe() {
  requestAnimationFrame(animateGlobe);
  earth.rotation.y += 0.002;
  renderer.render(scene, camera);
}
function runQuantumDemo() {
  document.getElementById("quantumResult").innerText = "Qubit in |0> transformed to superposition by H-gate.";
  document.getElementById("quantumHint").innerText = AITeacher.suggestNextStep("quantum");
  AITeacher.speak("Quantum demonstration active. Observe the globe's rotation as the probability field evolves.");
}
initGlobe();
</script>

</body>
</html>
